<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmkyawDev Editor - Projects</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/transforms.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='assets/icons/favicon.ico') }}" type="image/x-icon">
</head>
<body>
    <nav class="navbar">
        <div class="logo">AmkyawDev<span>Editor</span></div>
        <ul class="nav-links">
            <li><a href="/main" class="active">Projects</a></li>
            <li><a href="/about">About</a></li>
        </ul>
    </nav>

    <main class="container">
        <header class="main-header">
            <h1>Your Projects</h1>
            <button id="new-project-btn" class="btn btn-primary">New Project</button>
        </header>

        <div id="projects-grid" class="projects-grid">
            <!-- Projects will be loaded here via JS -->
            <div class="loading-spinner">Loading projects...</div>
        </div>
    </main>

    <!-- New Project Modal -->
    <div id="project-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Create New Project</h2>
            <form id="new-project-form">
                <div class="form-group">
                    <label for="project-name">Project Name</label>
                    <input type="text" id="project-name" name="project-name" placeholder="Enter project name" required>
                </div>
                <button type="submit" class="btn btn-primary">Create</button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        // ===== New Project Functionality =====
        
        // Show modal
        document.addEventListener('DOMContentLoaded', function() {
            const modal = document.getElementById('project-modal');
            const btn = document.getElementById('new-project-btn');
            const close = document.querySelector('.close');
            const form = document.getElementById('new-project-form');
            
            if (btn) {
                btn.onclick = function() {
                    modal.style.display = 'block';
                }
            }
            
            if (close) {
                close.onclick = function() {
                    modal.style.display = 'none';
                }
            }
            
            if (window.onclick) {
                window.onclick = function(event) {
                    if (event.target == modal) {
                        modal.style.display = 'none';
                    }
                }
            }
            
            if (form) {
                form.onsubmit = function(e) {
                    e.preventDefault();
                    const name = document.getElementById('project-name').value.trim();
                    
                    fetch('/api/projects', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: name })
                    })
                    .then(response => response.json())
                    .then(data => {
                        modal.style.display = 'none';
                        loadProjects(); // Reload projects
                        alert('Project "' + name + '" created!');
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        alert('Failed to create project');
                    });
                }
            }
            
            // Load projects
            loadProjects();
        });

        // Load projects list
        function loadProjects() {
            fetch('/api/projects')
                .then(response => response.json())
                .then(projects => {
                    const grid = document.getElementById('projects-grid');
                    if (!grid) return;
                    
                    grid.innerHTML = '';
                    projects.forEach(project => {
                        const card = document.createElement('div');
                        card.className = 'project-card';
                        card.innerHTML = '<h3>' + project + '</h3><a href="/editing?project=' + project + '" class="btn">Open</a>';
                        grid.appendChild(card);
                    });
                })
                .catch(error => console.error('Error loading projects:', error));
        }
    </script>
</body>
</html>
